<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>취소/반품 요청</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/layout/common.css">
  <link rel="stylesheet" href="/css/profile.css">
  <style>
    /* 기본 배경 및 폰트 설정 */
    /* 컨테이너 스타일 */
    .order-container {
    width: 100%;
    margin: 0 2px 0 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    }
    /* 테이블 스타일 */
    table {
          width: 100%;
          border-collapse: collapse;
          background-color: #fff;
          border-radius: 10px;
          overflow: hidden;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    table th {
      background-color: #f0f0f0;
      color: #555;
      text-align: center;
    }
    table td {
      vertical-align: middle;
      text-align: center;
      padding: 5px;
    }
    /* 이미지 스타일 */
    img {
      border: 1px solid #ddd;
      border-radius: 5px;
      transition: transform 0.3s ease;
    }
    img:hover {
      transform: scale(1.1);
    }
    .button {
          display: inline-block;
          padding: 10px 15px;
          font-size: 14px;
          font-weight: bold;
          text-align: center;
          border-radius: 5px;
          text-decoration: none;
          cursor: pointer;
          transition: 0.3s;
          background-color: #fafaff;
          color: black;
          border: 1px solid #ebecff;
          margin: 5px 0;
        }
        .button:hover {
          background-color: #7a7aff;
          color: white;
        }
  </style>
</head>
<body>
<div th:replace="fragment/header :: headerFragment"></div>
<div class="container">
  <section class="pm-section">
    <div th:replace="fragment/profile-common :: mypage-top"></div>
    <div class="mypage-bottom-content">
      <div th:replace="fragment/profile-common :: mypage-sidebar"></div>
<div class="order-container">
  <h2>교환 요청 목록</h2>
  <table>
    <thead>
    <tr>
      <th>회원 ID</th>
      <th>구매 상품 ID</th>
      <th>취소 / 반품 상태</th>
      <th>요청일시</th>
      <th>구매 정보</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="req : ${returns}">
      <td th:text="${req.purchaseReturnsId}"></td>
      <td th:text="${req.purchaseProduct.purchaseProductId}"></td>
      <td th:text="${req.purchaseProduct.cancelReason}"></td>
      <td>
        <div th:if="${req.returnsImagePaths != null}">
          <img th:each="path : ${#strings.arraySplit(req.returnsImagePaths, ',')}"
               th:src="@{${path}}"
               style="max-width: 100px; max-height: 100px; margin: 2px;" alt="업로드 이미지"/>
        </div>
      </td>
      <td th:text="${#temporals.format(req.createAt, 'yyyy-MM-dd HH:mm')}"></td>
      <td>
      <a class="button" th:href="@{/order/orders/{purchaseId}(purchaseId=${req.purchaseProduct.purchase.purchaseId})}">
        상세보기
      </a>
      </td>
    </tr>
    </tbody>
    <thead>
    <tr>
      <th>회원 ID</th>
      <th>구매 상품 ID</th>
      <th>취소 / 반품 상태</th>
      <th>요청일시</th>
      <th>구매 정보</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="req : ${returns}">
      <td th:text="${req.purchaseReturnsId}"></td>
      <td th:text="${req.purchaseProduct.purchaseProductId}"></td>
      <td th:text="${req.purchaseProduct.cancelReason}"></td>
      <td>
        <div th:if="${req.returnsImagePaths != null}">
          <img th:each="path : ${#strings.arraySplit(req.returnsImagePaths, ',')}"
               th:src="@{${path}}"
               style="max-width: 100px; max-height: 100px; margin: 2px;" alt="업로드 이미지"/>
        </div>
      </td>
      <td th:text="${#temporals.format(req.createAt, 'yyyy-MM-dd HH:mm')}"></td>
      <td>
      <a class="button" th:href="@{/order/orders/{purchaseId}(purchaseId=${req.purchaseProduct.purchase.purchaseId})}">
        상세보기
      </a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
    </div>
  </section>
</div>
<div th:replace="fragment/footer :: footerFragment"></div>
</body>
</html>
